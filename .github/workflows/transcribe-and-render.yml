name: Sottotitola e Pubblica Parlate

on:
  workflow_dispatch:
    inputs:
      date_folder:
        description: 'Cartella data su Drive (es. "14 04"). Vuoto = tutti i video nuovi'
        required: false
        type: string
        default: ''
      brand:
        description: 'Brand'
        required: false
        type: choice
        options:
          - marco
          - defimaso
          - 362gradi
        default: 'marco'
      schedule_times:
        description: 'Orari IT pubblicazione. Vuoto = solo render, no IG'
        required: false
        type: string
        default: '10:00,16:00'

permissions:
  contents: read

env:
  # Cartella "marco" dentro Storie Parlate (condivisa con link)
  DRIVE_MARCO_ID: '14GFCN2yM0D9A6D06sjpX1Dxjxmq-0eDq'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup gdown
        run: pip install gdown

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Download video da Google Drive
        run: |
          mkdir -p tmp/videos

          echo "Scarico cartella marco da Drive..."
          cd tmp
          gdown --folder "https://drive.google.com/drive/folders/$DRIVE_MARCO_ID" 2>&1 || true
          cd ..

          echo ""
          echo "=== Contenuto scaricato ==="
          find tmp/ -type f -name "*.mp4" -o -name "*.mov" 2>/dev/null | head -30

          # Copia tutti i video mp4/mov trovati (escudi fatto/Pubblicato/Reel)
          find tmp/ -type f \( -iname "*.mp4" -o -iname "*.mov" \) \
            ! -path "*/fatto/*" ! -path "*/Pubblicato/*" ! -path "*/Reel/*" \
            -exec cp {} tmp/videos/ \;

          echo ""
          echo "=== Video da processare ==="
          ls -lh tmp/videos/ 2>/dev/null || echo "Nessun video trovato!"
          COUNT=$(ls tmp/videos/*.mp4 tmp/videos/*.mov 2>/dev/null | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "ERRORE: nessun video trovato"
            exit 1
          fi

      - name: Render sottotitoli
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CI: "true"
        run: |
          node scripts/render-spoken-stories.mjs \
            --brand ${{ inputs.brand }} \
            --input=tmp/videos \
            --output=tmp/output

      - name: Lista output
        run: |
          echo "=== Video sottotitolati ==="
          ls -lh tmp/output/*-sub.mp4 2>/dev/null || echo "Nessun video generato!"

      - name: Upload su IG Schedule
        if: inputs.schedule_times != ''
        run: |
          SCHED_DATE=$(date -u +%Y-%m-%d)
          node scripts/upload-spoken-to-ig.mjs \
            --input=tmp/output \
            --brand=${{ inputs.brand }} \
            --time=${{ inputs.schedule_times }} \
            --date="$SCHED_DATE"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parlate-${{ inputs.brand }}-${{ github.run_id }}
          path: |
            tmp/output/*-sub.mp4
            tmp/output/*-sub-small.mp4
          retention-days: 7
          if-no-files-found: warn
